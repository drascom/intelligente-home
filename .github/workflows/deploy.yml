name: Deploy

# Mac'te geliştir → main'e push → iki hedef paralel deploy olur:
#  • deploy-test  : .25 LXC (ev LAN, NAT arkası) → orada KURULU self-hosted runner
#                   server-deploy.sh'i yerel çalıştırır. STT/TTS/vox/dashboard.
#  • deploy-stage : oracle-stage (public VPS) → brain + LiveKit agent. Public repo'da
#                   self-hosted runner ÖNERİLMEZ (fork PR riski), bu yüzden bulut
#                   runner SSH ile girip aynı server-deploy.sh'i çalıştırır.
# server-deploy.sh host-bilinçli: brain sadece enabled olduğu sunucuda (stage) restart+health;
# dashboard sadece unit'i olan sunucuda (.25) derlenir.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Aynı anda tek deploy seti; yenisi gelince eskisini iptal et
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # --- .25 LXC (ev), self-hosted runner sunucunun kendisinde ---
  deploy-test:
    runs-on: [self-hosted, linux]
    steps:
      - name: Deploy .25 (STT/TTS/vox/dashboard)
        run: sudo /opt/intelligente-home/deploy/server-deploy.sh

  # --- oracle-stage (public VPS), bulut runner SSH ile deploy eder ---
  deploy-stage:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy brain to oracle-stage over SSH
        env:
          SSH_KEY: ${{ secrets.ORACLE_STAGE_SSH_KEY }}
        run: |
          umask 077
          printf '%s\n' "$SSH_KEY" > deploy_key
          ssh -i deploy_key -o StrictHostKeyChecking=accept-new \
            ubuntu@132.145.24.135 'sudo /opt/intelligente-home/deploy/server-deploy.sh'
