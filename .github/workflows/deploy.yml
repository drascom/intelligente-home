name: Deploy

# Mac'te geliştir → main'e push → oracle-stage (public VPS) otomatik deploy olur:
#   • deploy-stage : oracle-stage → brain + LiveKit (deploy/deploy-stage.sh). Bulut
#                    runner SSH ile girip script'i çalıştırır.
#
# .25 (ev LAN GPU box: STT/TTS/LLM + dashboard) ARTIK CI ile deploy OLMAZ — self-hosted
# runner kaldırıldı (2026-06-25). .25 deploy'u MANUEL: deploy/deploy-gpu.sh
# (ssh root@192.168.0.25 'cd /opt/intelligente-home && sudo deploy/deploy-gpu.sh').
# İki host AYRI script ile deploy edilir; karıştırılmaz (brain deploy'u .25'e dokunmaz).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Aynı anda tek deploy; yenisi gelince eskisini iptal et
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # --- oracle-stage (public VPS), bulut runner SSH ile brain + LiveKit deploy eder ---
  deploy-stage:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy brain + LiveKit to oracle-stage over SSH
        env:
          SSH_KEY: ${{ secrets.ORACLE_STAGE_SSH_KEY }}
        run: |
          umask 077
          printf '%s\n' "$SSH_KEY" > deploy_key
          # Inline pull bootstrap: yeni script adı sunucuda yoksa önce git ile getir,
          # sonra çalıştır (script kendi içinde de reset --hard yapar, idempotent).
          ssh -i deploy_key -o StrictHostKeyChecking=accept-new \
            ubuntu@132.145.24.135 \
            'cd /opt/intelligente-home && sudo git fetch -q origin main && sudo git reset --hard -q origin/main && sudo deploy/deploy-stage.sh'
