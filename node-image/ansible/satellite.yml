# Candan satellite filo kurulumu/güncellemesi — bootstrap.sh'ın Ansible hali.
# Kullanım:
#   cd node-image/ansible
#   cp inventory.example.ini inventory.ini   # node'larını yaz
#   ansible-playbook -i inventory.ini satellite.yml
---
- name: Candan voice satellite
  hosts: satellites
  become: true
  vars:
    wake_model: ok_nabu
    mqtt_port: 1883

  tasks:
    - name: Apt paketleri
      ansible.builtin.apt:
        name: [python3-venv, python3-pip, git, alsa-utils, avahi-daemon]
        update_cache: true
        install_recommends: false

    - name: /opt/candan dizini
      ansible.builtin.file:
        path: /opt/candan
        state: directory

    - name: Python venv + paketler
      ansible.builtin.pip:
        name:
          - wyoming-satellite
          - wyoming-openwakeword
          - "paho-mqtt>=2.0"
        virtualenv: /opt/candan/venv
        virtualenv_command: python3 -m venv

    - name: /etc/candan dizini
      ansible.builtin.file:
        path: /etc/candan
        state: directory

    - name: node.env
      ansible.builtin.copy:
        dest: /etc/candan/node.env
        mode: "0600"
        content: |
          NODE_ID={{ node_id | default(inventory_hostname) }}
          NODE_KIND=satellite
          MQTT_HOST={{ mqtt_host }}
          MQTT_PORT={{ mqtt_port }}
          MQTT_USERNAME={{ mqtt_username }}
          MQTT_PASSWORD={{ mqtt_password }}
      notify: restart node-agent

    - name: node-agent.py
      ansible.builtin.copy:
        src: ../node-agent.py
        dest: /opt/candan/node-agent.py
        mode: "0755"
      notify: restart node-agent

    - name: systemd — wyoming-openwakeword
      ansible.builtin.copy:
        dest: /etc/systemd/system/wyoming-openwakeword.service
        content: |
          [Unit]
          Description=Wyoming openWakeWord
          After=network-online.target

          [Service]
          ExecStart=/opt/candan/venv/bin/wyoming-openwakeword --uri tcp://127.0.0.1:10400 --preload-model {{ wake_model }}
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: restart satellite stack

    - name: systemd — wyoming-satellite
      ansible.builtin.copy:
        dest: /etc/systemd/system/wyoming-satellite.service
        content: |
          [Unit]
          Description=Wyoming Satellite (Candan)
          After=network-online.target wyoming-openwakeword.service
          Requires=wyoming-openwakeword.service

          [Service]
          ExecStart=/opt/candan/venv/bin/wyoming-satellite --name "{{ node_id | default(inventory_hostname) }}" --uri tcp://0.0.0.0:10700 --mic-command "arecord -D {{ mic_device | default('plughw:1,0') }} -r 16000 -c 1 -f S16_LE -t raw" --snd-command "aplay -D {{ snd_device | default('plughw:1,0') }} -r 22050 -c 1 -f S16_LE -t raw" --wake-uri tcp://127.0.0.1:10400 --wake-word-name {{ wake_model }}
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: restart satellite stack

    - name: systemd — node-agent
      ansible.builtin.copy:
        dest: /etc/systemd/system/node-agent.service
        content: |
          [Unit]
          Description=Candan node agent (MQTT yönetim düzlemi)
          After=network-online.target

          [Service]
          ExecStart=/opt/candan/venv/bin/python /opt/candan/node-agent.py
          Restart=always
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
      notify: restart node-agent

    - name: Servisler etkin
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
        daemon_reload: true
      loop: [wyoming-openwakeword, wyoming-satellite, node-agent]

  handlers:
    - name: restart satellite stack
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
        daemon_reload: true
      loop: [wyoming-openwakeword, wyoming-satellite]

    - name: restart node-agent
      ansible.builtin.systemd:
        name: node-agent
        state: restarted
        daemon_reload: true
